function toggleChat(){

function sendMessage(){
  const input = document.getElementById('tfv-input');
  const text  = input.value.trim();
  if(!text || isTyping) return;
  input.value = '';
  processUserInput(text);
}

// ---- PROCESS INPUT ----
async function processUserInput(userText){
  addUserMessage(userText);
  document.getElementById('tfv-qr-wrap').innerHTML = '';

  // Check for lead capture triggers
  const lower = userText.toLowerCase();
  if(lower.includes('book') || lower.includes('consultation') || lower.includes('consult') ||
     lower.includes('contact') || lower.includes('help me') || lower.includes('file my') ||
     lower.includes('itr') && lower.includes('file')){
    if(!leadCaptured){
      setTimeout(()=>showLeadForm(), 600);
      return;
    }
  }

  // AI Response
  isTyping = true;
  document.getElementById('tfv-send-btn').disabled = true;
  showTyping();

  chatHistory.push({ role: 'user', content: userText });

  try {
    const response = await fetch('https://cdolopmcfllikyjbfhhv.supabase.co/functions/v1/Chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${TFV_SUPABASE_KEY}`
    },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        system: `You are TheFinVerge Assistant — an AI financial assistant for TheFinVerge Services, run by a qualified professionals based in India.

Your expertise:
- Indian Income Tax — ITR filing, old vs new regime, FY 2025-26 (AY 2026-27), Income Tax Act 2025 effective April 2026
- Capital Gains Tax — STCG (20% equity), LTCG (12.5%), ₹1.25L exemption, CII 376 for FY 2025-26, indexation for pre-July 2024 property
- Mutual Funds — SIP, XIRR, NAV, expense ratio, fund categories, overlap
- GST — registration, GSTR-1, GSTR-3B, composition scheme
- Financial Planning — SIP calculations, goal planning, retirement corpus
- Tax Saving — 80C (₹1.5L), 80D (₹25K), HRA, NPS 80CCD, home loan interest

IMPORTANT RULES:
1. Only answer India-specific finance and tax questions
2. Keep answers concise — 3-5 lines max for chat
3. Always add: "For personalised advice, book a free consultation at thefinvergeservices.com"
4. Use ₹ symbol, Indian number format (lakhs, crores)
5. If asked about specific investment recommendations, say you cannot advise without SEBI IA registration but can explain concepts
6. Be friendly and professional — you represent a CA firm
7. Use simple language — explain jargon when used
8. If someone asks to file ITR or book a consultation, say "Let me connect you with our team — I'll collect your details"`,
        messages: chatHistory
      })
    });

    const data  = await response.json();
    const reply = data.content?.[0]?.text || 'I apologize, I could not process that. Please try again or contact us directly.';

    hideTyping();
    chatHistory.push({ role: 'assistant', content: reply });
    addBotMessage(reply);

    // Set contextual quick replies
    if(lower.includes('itr') || lower.includes('income tax') || lower.includes('tax')){
      setQuickReplies(['Old vs New Regime?','80C deductions?','ITR deadline?','Book Filing Help']);
    } else if(lower.includes('sip') || lower.includes('mutual fund') || lower.includes('invest')){
      setQuickReplies(['How much SIP needed?','Best fund types?','XIRR explained?','Book Portfolio Review']);
    } else if(lower.includes('capital gain') || lower.includes('shares') || lower.includes('stock')){
      setQuickReplies(['LTCG exemption?','Property gains?','Tax harvesting?','Calculate My Tax']);
    } else {
      setQuickReplies(['📋 ITR Filing','💰 Capital Gains','📈 SIP Planning','📞 Book Consultation']);
    }

  } catch(err){
    hideTyping();
    addBotMessage(`I'm having trouble connecting right now. Please try again in a moment, or reach out directly at **hello@thefinvergeservices.com** — we typically respond within 2 hours.`);
    setQuickReplies(['Try Again','📞 Book Consultation']);
  }

  isTyping = false;
  document.getElementById('tfv-send-btn').disabled = false;
}

// ---- HELPERS ----
function formatText(text){
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong style="color:#f4f6fa">$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code style="background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:4px;font-family:JetBrains Mono,monospace;font-size:0.82em">$1</code>')
    .replace(/•\s/g, '• ')
    .replace(/\n/g, '<br/>');
}

function escapeHtml(text){
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollToBottom(){
  const msgs = document.getElementById('tfv-messages');
  setTimeout(()=>{ msgs.scrollTop = msgs.scrollHeight; }, 50);
}

// Auto-open after 45 seconds if user hasn't opened
setTimeout(()=>{
  if(!chatOpen && !sessionStorage.getItem('tfv_chat_dismissed')){
    document.getElementById('tfv-notif').style.display = 'block';
  }
}, 45000);

// Track close
document.getElementById('tfv-close-btn').addEventListener('click', ()=>{
  sessionStorage.setItem('tfv_chat_dismissed', '1');
});
</script>
